<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Land of Legacy"/>
<meta name="theme-color" content="#060709"/>
<meta name="mobile-web-app-capable" content="yes"/>
<title>Land of Legacy — Team Tracker</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23060709' width='100' height='100' rx='22'/><text x='50' y='65' text-anchor='middle' font-size='50' fill='%23C9A84C'>◈</text></svg>"/>
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23060709' width='100' height='100' rx='22'/><text x='50' y='65' text-anchor='middle' font-size='50' fill='%23C9A84C'>◈</text></svg>"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;touch-action:manipulation;height:100%}
body{overscroll-behavior:none;background:#060709;font-family:'Outfit',sans-serif;-webkit-font-smoothing:antialiased;min-height:100%;min-height:100dvh}
input:focus{outline:none}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield}
button{-webkit-tap-highlight-color:transparent;border:none;cursor:pointer;font-family:inherit}
::-webkit-scrollbar{display:none}
#root{min-height:100dvh}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes barIn{from{transform:scaleX(0)}to{transform:scaleX(1)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastIn{from{opacity:0;transform:translateY(30px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(201,168,76,.12)}50%{box-shadow:0 0 40px rgba(201,168,76,.28)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
</style>

<script>
// ═══════════════════════════════════════════════════════════
//  FIREBASE CONFIG — PASTE YOUR CONFIG HERE (see instructions)
// ═══════════════════════════════════════════════════════════
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
  projectId: "YOUR_PROJECT",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "000000000000",
  appId: "YOUR_APP_ID"
};
// ═══════════════════════════════════════════════════════════

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
</script>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ════════════════════════════════════════════════════════
//  TEAM CONFIG — Edit names, goals, codes here
// ════════════════════════════════════════════════════════
const AGENTS = [
  { id:"ap",    name:"AP",        goal:7000, color:"#C9A84C", pin:"1001" },
  { id:"ryan",  name:"Ryan",      goal:0,    color:"#5B8BD4", pin:"1002" },
  { id:"john",  name:"John",      goal:0,    color:"#4EBF8B", pin:"1003" },
  { id:"matt",  name:"Matthew",   goal:0,    color:"#9B7ED8", pin:"1004" },
  { id:"chris", name:"Christian",  goal:0,   color:"#D46B8C", pin:"1005" },
  { id:"keel",  name:"Keelan",    goal:0,    color:"#D4845B", pin:"1006" },
  { id:"kent",  name:"Kente",     goal:0,    color:"#4EB8B5", pin:"1007" },
];
const ADMIN_PIN = "9999";
const RATE = 0.25;
// ════════════════════════════════════════════════════════

// Firebase helpers
const fbSet = (path, val) => db.ref(path).set(val);
const fbGet = async (path) => { const snap = await db.ref(path).once("value"); return snap.val(); };
const fbListen = (path, cb) => { const ref = db.ref(path); ref.on("value", snap => cb(snap.val())); return () => ref.off("value"); };

const dayKey = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
const todayK = () => dayKey(new Date());
const $ = n => "$"+Number(n||0).toLocaleString("en-US");
const empty = () => AGENTS.reduce((a,m)=>({...a,[m.id]:{ap:0,pol:0}}),{});

function rangeDays(t) {
  const n=new Date(),d=[];
  if(t==="week"){const dow=n.getDay();for(let i=dow;i>=0;i--){const x=new Date(n);x.setDate(n.getDate()-i);d.push(dayKey(x));}}
  else if(t==="month"){for(let i=1;i<=n.getDate();i++)d.push(dayKey(new Date(n.getFullYear(),n.getMonth(),i)));}
  else if(t==="year"){const y=n.getFullYear();for(let m=0;m<=n.getMonth();m++){const mx=m===n.getMonth()?n.getDate():new Date(y,m+1,0).getDate();for(let i=1;i<=mx;i++)d.push(dayKey(new Date(y,m,i)));}}
  return d;
}

// ═══ LOCK SCREEN ═══
function LockScreen({ onLogin }) {
  const [pin, setPin] = useState("");
  const [err, setErr] = useState(false);
  const [pressed, setPressed] = useState(null);

  const tryLogin = p => {
    const v = p||pin;
    if (v===ADMIN_PIN) { onLogin("admin",null); return; }
    const ag = AGENTS.find(a=>a.pin===v);
    if (ag) { onLogin("agent",ag.id); return; }
    setErr(true); setPin("");
  };

  const tapNum = n => {
    setPressed(n); setErr(false);
    setTimeout(()=>setPressed(null),120);
    const next = pin+n;
    setPin(next);
    if (next.length===4) setTimeout(()=>tryLogin(next),150);
  };

  return (
    <div style={L.wrap}>
      <div style={L.logoArea}>
        <div style={L.shield}>◈</div>
        <h1 style={L.brand}>LAND OF LEGACY</h1>
        <div style={L.tag}>TEAM PERFORMANCE TRACKER</div>
      </div>
      <div style={L.dotRow}>
        {[0,1,2,3].map(i=>(
          <div key={i} style={{...L.dot,background:i<pin.length?"#C9A84C":"rgba(255,255,255,.06)",boxShadow:i<pin.length?"0 0 12px rgba(201,168,76,.4)":"none"}} />
        ))}
      </div>
      {err ? <div style={L.err}>Invalid code</div> : <div style={L.hint}>Enter your 4-digit code</div>}
      <div style={L.pad}>
        {[1,2,3,4,5,6,7,8,9,"",0,"⌫"].map((n,i)=>(
          n==="" ? <div key={i}/> :
          <button key={i} onClick={()=>n==="⌫"?(() => {setPin(pin.slice(0,-1));setErr(false);})():tapNum(String(n))}
            style={{...L.btn,...(pressed===String(n)?{background:"rgba(201,168,76,.12)"}:{})}}>
            <span style={n==="⌫"?{fontSize:20}:{fontSize:26}}>{n}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

// ═══ MAIN APP ═══
function App() {
  const [role,setRole]=useState(null);
  const [me,setMe]=useState(null);
  const [data,setData]=useState(null);
  const [allDays,setAllDays]=useState({});
  const [tab,setTab]=useState("dash");
  const [period,setPeriod]=useState("day");
  const [editing,setEditing]=useState(null);
  const [editVal,setEditVal]=useState("");
  const [anim,setAnim]=useState(false);
  const [toast,setToast]=useState(null);
  const [connected,setConnected]=useState(false);

  const SK = `days/${todayK()}`;
  const showToast = m => { setToast(m); setTimeout(()=>setToast(null),2200); };

  const onLogin = useCallback(async (r,agentId) => {
    setRole(r); setMe(agentId);
    // Listen to today in realtime
    const unsub = fbListen(SK, val => {
      setData(val ? {...empty(),...val} : empty());
      setConnected(true);
    });
    // Load history
    const all = await fbGet("days") || {};
    setAllDays(all);
    setTimeout(()=>setAnim(true),80);
    return unsub;
  }, []);

  // Keep history fresh
  useEffect(()=>{
    if(!role) return;
    const iv = setInterval(async ()=>{
      const all = await fbGet("days")||{};
      setAllDays(all);
    },15000);
    return ()=>clearInterval(iv);
  },[role]);

  const save = async (nd) => { setData(nd); await fbSet(SK,nd); };
  const startEdit = (mid,f) => { setEditing(`${mid}-${f}`); setEditVal(""); };
  const commit = (mid,f) => {
    const v = parseFloat(editVal)||0;
    const nd = {...data,[mid]:{...data[mid],[f]:v}};
    save(nd);
    setEditing(null);
    showToast(`${AGENTS.find(a=>a.id===mid)?.name} updated`);
  };
  const onKey = (e,mid,f) => { if(e.key==="Enter"){e.target.blur();commit(mid,f);}if(e.key==="Escape")setEditing(null); };

  const getAgg = useCallback(t => {
    if(t==="day") return data||empty();
    const days = rangeDays(t);
    const agg = empty();
    const src = {...allDays,[todayK()]:data};
    for(const d of days){const dd=src[d];if(dd)for(const m of AGENTS){agg[m.id].ap+=(dd[m.id]?.ap||0);agg[m.id].pol+=(dd[m.id]?.pol||0);}}
    return agg;
  },[data,allDays]);

  // Lock
  if(!role) return <LockScreen onLogin={onLogin}/>;
  if(!data) return (
    <div style={{minHeight:"100dvh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"#060709",gap:12}}>
      <div style={{width:24,height:24,border:"2px solid #1a1c24",borderTopColor:"#C9A84C",borderRadius:"50%",animation:"spin .7s linear infinite"}}/>
      <div style={{fontSize:12,color:"#3A3D48",fontFamily:"'IBM Plex Mono',monospace"}}>Connecting to Firebase...</div>
    </div>
  );

  const agg=getAgg(period);
  const totAP=Object.values(agg).reduce((s,v)=>s+(v.ap||0),0);
  const totPol=Object.values(agg).reduce((s,v)=>s+(v.pol||0),0);
  const totComm=totAP*RATE;
  const maxAP=Math.max(...AGENTS.map(m=>agg[m.id]?.ap||0),1);
  const ranked=[...AGENTS].sort((a,b)=>(agg[b.id]?.ap||0)-(agg[a.id]?.ap||0));
  const pLabel={day:"Today",week:"This Week",month:"This Month",year:"This Year"}[period];
  const isAdmin=role==="admin";
  const myAgent=AGENTS.find(a=>a.id===me);

  return (
    <div style={S.shell}>
      {/* HEADER */}
      <div style={S.topSafe}>
        <div style={S.hRow}>
          <div>
            <div style={S.bRow}><span style={S.bIcon}>◈</span><span style={S.bTxt}>LAND OF LEGACY</span></div>
            <div style={S.welcome}>{isAdmin?"Admin Dashboard":`Welcome, ${myAgent?.name}`}</div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{...S.connDot,background:connected?"#4EBF8B":"#D46B6B"}} />
            <button onClick={()=>{setRole(null);setMe(null);setData(null);setTab("dash");setPeriod("day");}} style={S.logBtn}>Log out</button>
          </div>
        </div>
      </div>

      {/* PILLS */}
      <div style={S.pillRow}>
        {["day","week","month","year"].map(p=>(
          <button key={p} onClick={()=>setPeriod(p)} style={{...S.pill,...(period===p?S.pillOn:{})}}>{p[0].toUpperCase()+p.slice(1)}</button>
        ))}
      </div>

      {/* ═══════════════════ AGENT VIEW ═══════════════════ */}
      {!isAdmin && myAgent && (
        <div style={S.content}>
          <div style={{...S.pCard,animation:anim?"fadeIn .4s ease both":"none"}}>
            <div style={S.pTop}>
              <div style={{...S.pAv,background:`${myAgent.color}15`,color:myAgent.color}}>{myAgent.name[0]}</div>
              <div><div style={S.pName}>{myAgent.name}</div><div style={S.pRole}>{myAgent.goal>0?`Daily Goal: ${$(myAgent.goal)}`:"Agent"}</div></div>
            </div>
            <div style={S.pStats}>
              <div style={S.pSt}><div style={S.pStL}>{pLabel} AP</div><div style={{...S.pStV,color:"#C9A84C"}}>{$(agg[me]?.ap||0)}</div></div>
              <div style={S.pDiv}/>
              <div style={S.pSt}><div style={S.pStL}>Commission</div><div style={{...S.pStV,color:"#4EBF8B"}}>{$((agg[me]?.ap||0)*RATE)}</div></div>
              <div style={S.pDiv}/>
              <div style={S.pSt}><div style={S.pStL}>Policies</div><div style={{...S.pStV,color:"#5B8BD4"}}>{agg[me]?.pol||0}</div></div>
            </div>
            {myAgent.goal>0 && (()=>{
              const pct=Math.min(((data[me]?.ap||0)/myAgent.goal)*100,100);
              return(<div style={S.pProg}><div style={S.pPrTr}><div style={{...S.pPrFl,width:`${pct}%`,background:pct>=100?"linear-gradient(90deg,#4EBF8B,#6FE4AB)":`linear-gradient(90deg,${myAgent.color},${myAgent.color}AA)`,animation:anim?"barIn 1s ease both":"none",transformOrigin:"left"}}/></div><span style={{...S.pPrPc,color:pct>=100?"#4EBF8B":"#4A5060"}}>{Math.round(pct)}%</span></div>);
            })()}
            <div style={S.pEdLbl}>Update Today's Numbers</div>
            <div style={S.nG}>
              <div style={S.nC}>
                <div style={S.nT}>AP WRITTEN</div>
                {editing===`${me}-ap`?(
                  <input autoFocus type="number" inputMode="decimal" value={editVal} onChange={e=>setEditVal(e.target.value)} onBlur={()=>commit(me,"ap")} onKeyDown={e=>onKey(e,me,"ap")} style={S.nI}/>
                ):(
                  <button onClick={()=>startEdit(me,"ap")} style={{...S.nB,color:(data[me]?.ap||0)>0?"#C9A84C":"#1E2028"}}>{$(data[me]?.ap||0)}</button>
                )}
              </div>
              <div style={S.nS}/>
              <div style={S.nC}>
                <div style={S.nT}>POLICIES</div>
                {editing===`${me}-pol`?(
                  <input autoFocus type="number" inputMode="numeric" value={editVal} onChange={e=>setEditVal(e.target.value)} onBlur={()=>commit(me,"pol")} onKeyDown={e=>onKey(e,me,"pol")} style={S.nI}/>
                ):(
                  <button onClick={()=>startEdit(me,"pol")} style={{...S.nB,color:(data[me]?.pol||0)>0?"#CBD5E1":"#1E2028"}}>{data[me]?.pol||0}</button>
                )}
              </div>
            </div>
          </div>
          <div style={{...S.secLbl,animation:anim?"fadeIn .5s ease both":"none",animationDelay:".15s"}}>Team Rankings — {pLabel}</div>
          {ranked.map((m,i)=>{
            const v=agg[m.id]?.ap||0;const medal=i===0?"🥇":i===1?"🥈":i===2?"🥉":`#${i+1}`;const isMe=m.id===me;
            return(
              <div key={m.id} style={{...S.rRow,...(isMe?{background:"rgba(201,168,76,.05)",border:"1px solid rgba(201,168,76,.1)"}:{}),...(i===0&&!isMe?S.rFirst:{}),animation:anim?"slideUp .4s ease both":"none",animationDelay:`${.2+i*.04}s`}}>
                <div style={S.rL}><span style={{...S.rM,...(i<3?{fontSize:24}:{})}}>{medal}</span><div><div style={{...S.rN,...(i===0?{color:"#C9A84C"}:{}),...(isMe?{color:myAgent.color}:{})}}>{m.name}{isMe?" (You)":""}</div><div style={S.rS}>{agg[m.id]?.pol||0} pol · {$(v*RATE)} comm</div></div></div>
                <div style={{...S.rV,color:v>0?"#C9A84C":"#141618"}}>{$(v)}</div>
              </div>
            );
          })}
        </div>
      )}

      {/* ═══════════════════ ADMIN VIEW ═══════════════════ */}
      {isAdmin && (<>
        <div style={{...S.sumR,animation:anim?"fadeIn .35s ease both":"none"}}>
          <div style={S.sumB}><div style={S.sumL}>TOTAL AP</div><div style={{...S.sumV,color:"#C9A84C"}}>{$(totAP)}</div><div style={S.sumSb}>{pLabel}</div></div>
          <div style={S.sumB}><div style={S.sumL}>EST. COMM</div><div style={{...S.sumV,color:"#4EBF8B"}}>{$(totComm)}</div><div style={S.sumSb}>@ {RATE*100}%</div></div>
          <div style={S.sumB}><div style={S.sumL}>POLICIES</div><div style={{...S.sumV,color:"#5B8BD4"}}>{totPol}</div><div style={S.sumSb}>{pLabel}</div></div>
        </div>
        <div style={S.tRow}>
          {[{id:"dash",l:"Team"},{id:"chart",l:"Charts"},{id:"board",l:"Ranks"}].map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{...S.tBtn,...(tab===t.id?S.tOn:{})}}>{t.l}</button>
          ))}
        </div>
        <div style={S.content}>

          {/* TEAM DASH */}
          {tab==="dash"&&(
            <div style={S.cStack}>
              {period!=="day"&&<div style={S.iBar}>Viewing {pLabel.toLowerCase()} totals · Edit today below</div>}
              {AGENTS.map((m,i)=>{
                const row=data[m.id]||{ap:0,pol:0};const ag=agg[m.id]||{ap:0,pol:0};const comm=ag.ap*RATE;
                const pct=m.goal>0?Math.min((row.ap/m.goal)*100,100):-1;const isEd=f=>editing===`${m.id}-${f}`;
                return(
                  <div key={m.id} style={{...S.card,animation:anim?"fadeIn .4s ease both":"none",animationDelay:`${.04+i*.03}s`}}>
                    <div style={{...S.cBar,background:m.color}}/>
                    <div style={S.cTop}>
                      <div style={S.cNA}><div style={{...S.cAv,background:`${m.color}15`,color:m.color}}>{m.name[0]}</div><div><div style={S.cNm}>{m.name}</div>{m.goal>0&&<div style={S.cGl}>Goal: {$(m.goal)}</div>}</div></div>
                      {comm>0&&<div style={S.cCm}>{$(comm)}<span style={S.cCmS}> comm</span></div>}
                    </div>
                    {period!=="day"&&(ag.ap>0||ag.pol>0)&&(
                      <div style={S.agR}><div style={S.agC}><span style={S.agCL}>{pLabel} AP:</span> <span style={{color:"#C9A84C",fontWeight:700}}>{$(ag.ap)}</span></div><div style={S.agC}><span style={S.agCL}>Pol:</span> <span style={{color:"#94A3B8",fontWeight:700}}>{ag.pol}</span></div></div>
                    )}
                    <div style={S.nG}>
                      <div style={S.nC}>
                        <div style={S.nT}>TODAY AP</div>
                        {isEd("ap")?(<input autoFocus type="number" inputMode="decimal" value={editVal} onChange={e=>setEditVal(e.target.value)} onBlur={()=>commit(m.id,"ap")} onKeyDown={e=>onKey(e,m.id,"ap")} style={S.nI}/>):(<button onClick={()=>startEdit(m.id,"ap")} style={{...S.nB,color:row.ap>0?"#C9A84C":"#1E2028"}}>{$(row.ap)}</button>)}
                      </div>
                      <div style={S.nS}/>
                      <div style={S.nC}>
                        <div style={S.nT}>POLICIES</div>
                        {isEd("pol")?(<input autoFocus type="number" inputMode="numeric" value={editVal} onChange={e=>setEditVal(e.target.value)} onBlur={()=>commit(m.id,"pol")} onKeyDown={e=>onKey(e,m.id,"pol")} style={S.nI}/>):(<button onClick={()=>startEdit(m.id,"pol")} style={{...S.nB,color:row.pol>0?"#CBD5E1":"#1E2028"}}>{row.pol}</button>)}
                      </div>
                    </div>
                    {pct>=0&&(<div style={S.prR}><div style={S.prT}><div style={{...S.prF,width:`${pct}%`,background:pct>=100?"linear-gradient(90deg,#4EBF8B,#6FE4AB)":`linear-gradient(90deg,${m.color},${m.color}99)`,animation:anim?"barIn .9s ease both":"none",animationDelay:`${.25+i*.04}s`,transformOrigin:"left"}}/></div><span style={{...S.prP,color:pct>=100?"#4EBF8B":"#3A3D48"}}>{Math.round(pct)}%</span></div>)}
                  </div>
                );
              })}
            </div>
          )}

          {/* CHARTS */}
          {tab==="chart"&&(
            <div style={{animation:anim?"fadeIn .4s ease both":"none"}}>
              <div style={S.secLbl}>AP Written — {pLabel}</div>
              <div style={S.chA}>
                {AGENTS.map((m,i)=>{const v=agg[m.id]?.ap||0;const w=(v/maxAP)*100;return(
                  <div key={m.id} style={{...S.bR,animation:anim?"slideUp .4s ease both":"none",animationDelay:`${i*.05}s`}}>
                    <div style={S.bL}><div style={{...S.bD,background:m.color}}/><span style={S.bN}>{m.name}</span></div>
                    <div style={S.bTr}><div style={{...S.bF,width:`${w}%`,background:`linear-gradient(90deg,${m.color},${m.color}AA)`,animation:anim?"barIn .8s ease both":"none",animationDelay:`${.1+i*.06}s`,transformOrigin:"left"}}/></div>
                    <span style={S.bV}>{$(v)}</span>
                  </div>
                );})}
              </div>
              <div style={{...S.secLbl,marginTop:28}}>Commission — {pLabel}</div>
              <div style={S.cmG}>
                {AGENTS.map((m,i)=>{const c=(agg[m.id]?.ap||0)*RATE;return(
                  <div key={m.id} style={{...S.cmC,animation:anim?"slideUp .35s ease both":"none",animationDelay:`${.2+i*.04}s`}}>
                    <div style={{...S.cmD,background:m.color}}/><span style={S.cmN}>{m.name}</span><span style={{...S.cmV,color:c>0?"#4EBF8B":"#141618"}}>{$(c)}</span>
                  </div>
                );})}
              </div>
              <div style={{...S.secLbl,marginTop:28}}>Policies — {pLabel}</div>
              <div style={S.chA}>
                {AGENTS.map((m,i)=>{const v=agg[m.id]?.pol||0;const mx=Math.max(...AGENTS.map(x=>agg[x.id]?.pol||0),1);const w=(v/mx)*100;return(
                  <div key={m.id} style={{...S.bR,animation:anim?"slideUp .4s ease both":"none",animationDelay:`${.3+i*.05}s`}}>
                    <div style={S.bL}><div style={{...S.bD,background:m.color}}/><span style={S.bN}>{m.name}</span></div>
                    <div style={S.bTr}><div style={{...S.bF,width:`${w}%`,background:`linear-gradient(90deg,${m.color}88,${m.color}55)`,animation:anim?"barIn .8s ease both":"none",animationDelay:`${.35+i*.06}s`,transformOrigin:"left"}}/></div>
                    <span style={S.bV}>{v}</span>
                  </div>
                );})}
              </div>
            </div>
          )}

          {/* RANKS */}
          {tab==="board"&&(
            <div style={{animation:anim?"fadeIn .4s ease both":"none"}}>
              <div style={S.secLbl}>Leaderboard — {pLabel}</div>
              {ranked.map((m,i)=>{const v=agg[m.id]?.ap||0;const medal=i===0?"🥇":i===1?"🥈":i===2?"🥉":`#${i+1}`;return(
                <div key={m.id} style={{...S.rRow,...(i===0?S.rFirst:{}),animation:anim?"slideUp .45s ease both":"none",animationDelay:`${i*.05}s`}}>
                  <div style={S.rL}><span style={{...S.rM,...(i<3?{fontSize:26}:{})}}>{medal}</span><div><div style={{...S.rN,...(i===0?{color:"#C9A84C",fontSize:18}:{})}}>{m.name}</div><div style={S.rS}>{agg[m.id]?.pol||0} pol · {$(v*RATE)} comm</div></div></div>
                  <div style={{...S.rV,color:v>0?"#C9A84C":"#141618"}}>{$(v)}</div>
                </div>
              );})}
              <div style={S.ttB}>
                <div style={S.ttTi}>Team Totals — {pLabel}</div>
                {[{l:"Combined AP",v:$(totAP),c:"#C9A84C"},{l:"Combined Commission",v:$(totComm),c:"#4EBF8B"},{l:"Total Policies",v:totPol,c:"#5B8BD4"},{l:"Avg AP / Person",v:$(totAP/AGENTS.length),c:"#94A3B8"}].map((r,i)=>(
                  <div key={i} style={S.ttR}><span style={S.ttL}>{r.l}</span><span style={{...S.ttV,color:r.c}}>{r.v}</span></div>
                ))}
              </div>
            </div>
          )}
        </div>

        {/* BOTTOM NAV */}
        <div style={S.bot}>
          {[{id:"dash",l:"Team",ic:"⊞"},{id:"chart",l:"Charts",ic:"◩"},{id:"board",l:"Ranks",ic:"◈"}].map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{...S.navB,color:tab===t.id?"#C9A84C":"#1E2028"}}>
              <span style={{fontSize:20}}>{t.ic}</span><span style={{fontSize:9,fontWeight:700,letterSpacing:.6}}>{t.l}</span>
            </button>
          ))}
        </div>
      </>)}

      {toast&&<div style={S.toast}>✓ {toast}</div>}
    </div>
  );
}
